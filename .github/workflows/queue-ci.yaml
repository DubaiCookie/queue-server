name: CI - Build & Push to AWS ECR

on:
  push:
    branches: [ "main", "develop" ]
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  AWS_ACCOUNT_ID: 881490135253
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: skala3-cloud1-team3-queue-server
  IMAGE_NAME: team3-queue-server

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build bootJar
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Resolve image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
          else
            IMAGE_TAG="${GITHUB_REF_NAME}-${SHORT_SHA}"
          fi
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_BASE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          echo "image_tag=${IMAGE_TAG}"                          >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}"                        >> "$GITHUB_OUTPUT"
          echo "image_versioned=${IMAGE_BASE}:${IMAGE_TAG}"      >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_BASE}:latest"               >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.vars.outputs.image_versioned }}
            ${{ steps.vars.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ steps.vars.outputs.image_versioned }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

  update-chart:
    name: Update Helm chart values
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout chart repo
        uses: actions/checkout@v4
        with:
          repository: DubaiCookie/Chart
          token: ${{ secrets.CHART_REPO_TOKEN }}
          path: chart-repo

      - name: Update image digest in values.yaml
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          DIGEST="${{ needs.build-and-push.outputs.image_digest }}"
          VALUES="chart-repo/charts/queue-server/values.yaml"

          sed -i "s|^\(\s*tag:\s*\).*|\1${IMAGE_TAG}|" "$VALUES"
          sed -i "s|^\(\s*digest:\s*\).*|\1${DIGEST}|" "$VALUES"

          echo "Updated values.yaml:"
          grep -A4 "^image:" "$VALUES"

      - name: Commit and push chart update
        run: |
          cd chart-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/queue-server/values.yaml
          git commit -m "chore(queue-server): deploy ${{ needs.build-and-push.outputs.image_tag }}

          digest: ${{ needs.build-and-push.outputs.image_digest }}"
          git push

