name: Queue CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  IMAGE_NAME: amdp-registry.skala-ai.com/skala26a-cloud/team3-queue-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 01. 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 02. JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 03. Gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 04. Gradle 빌드 (테스트 포함)
        run: ./gradlew clean build

      # PR은 여기까지만 실행 (이미지 빌드/푸시 제외)
      - name: 05. Docker Buildx 설정
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: 06. Harbor 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: amdp-registry.skala-ai.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: 07. 이미지 태그 생성
        if: github.event_name == 'push'
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: 08. Docker 이미지 빌드 & Push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 09. k8s 매니페스트 이미지 태그 업데이트
        if: github.event_name == 'push'
        run: |
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}|g" k8s/deployment.yaml

      - name: 10. 변경된 매니페스트 Git Push (ArgoCD 트리거)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet || git commit -m "[cd] update image tag to ${{ steps.meta.outputs.tag }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
